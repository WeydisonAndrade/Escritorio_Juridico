<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle - Escritório</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 20px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #D4AF37; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data { font-size: 12px; color: gray; }
        .btn-logout { background: #0a192f; color: gold; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; }
        .btn-logout:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto;">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Mensagens Recebidas</h1>
            <a href="login.html" id="btn-sair" class="btn-logout">Sair</a>
        </header>

        <p id="saudacao" style="color: #555; margin-bottom: 20px;"></p>

        <div id="lista-contatos">
            <p>Nenhum contato recebido ainda.</p>
        </div>
    </div>

    <script>
        /**
         * Proteção da página: dados de sessão vêm do sessionStorage (preenchido no login.html).
         * Se não houver 'logado', o usuário é redirecionado para login.
         */
        (function () {
            var logado = sessionStorage.getItem('logado');
            if (logado !== 'true') {
                window.location.href = 'login.html';
                return;
            }

            // Exibe saudação com o nome salvo no login (origem: localStorage → sessionStorage no login)
            var nome = sessionStorage.getItem('usuarioNome');
            if (nome) {
                var el = document.getElementById('saudacao');
                if (el) el.textContent = 'Olá, ' + nome + '.';
            }

            /**
             * Sair: limpa a sessão (sessionStorage) e redireciona para a tela de login.
             */
            document.getElementById('btn-sair').addEventListener('click', function (e) {
                e.preventDefault();
                sessionStorage.removeItem('logado');
                sessionStorage.removeItem('usuarioNome');
                sessionStorage.removeItem('usuarioEmail');
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>
