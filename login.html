<div class="login-container" style="max-width: 400px; margin: 100px auto; font-family: sans-serif; padding: 40px; border: 1px solid #ddd; border-radius: 8px;">
    <h2 style="color: #0a192f; border-bottom: 2px solid #D4AF37; padding-bottom: 10px;">Acesso Restrito</h2>
    <form action="/login" method="POST">
        <div style="margin: 20px 0;">
            <label>Usuário:</label>
            <input type="text" name="usuario" style="width: 100%; padding: 10px; margin-top: 5px;" required>
        </div>
        <div style="margin: 20px 0;">
            <label>Senha:</label>
            <input type="password" name="senha" style="width: 100%; padding: 10px; margin-top: 5px;" required>
        </div>
        <button type="submit" style="background: #0a192f; color: gold; padding: 10px 20px; border: none; cursor: pointer; width: 100%;">Entrar no Painel</button>
    </form>
</div>
