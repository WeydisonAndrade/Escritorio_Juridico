<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Justiça Trabalhista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f172a',
                        'navy-light': '#1e293b',
                        gold: '#b8860b',
                        'gold-light': '#daa520',
                        cream: '#fafaf9',
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'Georgia', 'serif'],
                        sans: ['Montserrat', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans antialiased"
      style="background-image: url('/static/images.Adv/Generated_image.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <!-- Overlay escuro para legibilidade do formulário -->
    <div class="absolute inset-0 bg-navy/60"></div>

    <div class="relative w-full max-w-md">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/20 p-8 md:p-10">
            <h1 class="font-serif text-2xl md:text-3xl font-bold text-navy mb-1">Acesso Restrito</h1>
            <p class="text-navy-light/70 text-sm mb-8">Entre com suas credenciais para acessar o painel.</p>

            <form action="/login" method="POST" class="space-y-6">
                <div>
                    <label for="usuario" class="block text-navy font-semibold mb-2 text-sm">Usuário</label>
                    <input type="text"
                           id="usuario"
                           name="usuario"
                           required
                           autocomplete="username"
                           placeholder="Digite seu usuário"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all placeholder:text-gray-400">
                </div>
                <div>
                    <label for="senha" class="block text-navy font-semibold mb-2 text-sm">Senha</label>
                    <input type="password"
                           id="senha"
                           name="senha"
                           required
                           autocomplete="current-password"
                           placeholder="Digite sua senha"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all placeholder:text-gray-400">
                </div>
                <button type="submit"
                        class="w-full bg-navy text-gold font-semibold py-3.5 rounded-lg hover:bg-navy-light transition-colors duration-200 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2">
                    Entrar no Painel
                </button>
            </form>

            <p class="mt-6 text-center text-navy-light/60 text-xs">
                Justiça Trabalhista · Área administrativa
            </p>
        </div>
    </div>
</body>
</html>
