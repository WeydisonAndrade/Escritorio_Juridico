<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Justiça Trabalhista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0f172a',
                        'navy-light': '#1e293b',
                        gold: '#b8860b',
                        'gold-light': '#daa520',
                        cream: '#fafaf9',
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'Georgia', 'serif'],
                        sans: ['Montserrat', 'system-ui', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center p-4 font-sans antialiased"
      style="background-image: url('/static/images.Adv/Generated_image.png'); background-size: cover; background-position: center; background-repeat: no-repeat;">
    <div class="absolute inset-0 bg-navy/60"></div>

    <div class="relative w-full max-w-md">
        <div class="bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-white/20 p-8 md:p-10">
            <h1 class="font-serif text-2xl md:text-3xl font-bold text-navy mb-1">Cadastro</h1>
            <p class="text-navy-light/70 text-sm mb-8">Crie seu acesso ao painel do escritório.</p>

            <!-- Mensagem de feedback (sucesso/erro) -->
            <div id="mensagem" class="hidden mb-6 p-4 rounded-lg text-sm"></div>

            <form id="form-cadastro" class="space-y-6">
                <div>
                    <label for="nome" class="block text-navy font-semibold mb-2 text-sm">Nome completo</label>
                    <input type="text"
                           id="nome"
                           name="nome"
                           required
                           autocomplete="name"
                           placeholder="Digite seu nome"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all placeholder:text-gray-400">
                </div>
                <div>
                    <label for="oab" class="block text-navy font-semibold mb-2 text-sm">Número de Registro na OAB</label>
                    <input type="text"
                           id="oab"
                           name="oab"
                           required
                           placeholder="Ex: 123456/SP"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all placeholder:text-gray-400">
                </div>
                <div>
                    <label for="email" class="block text-navy font-semibold mb-2 text-sm">E-mail</label>
                    <input type="email"
                           id="email"
                           name="email"
                           required
                           autocomplete="email"
                           placeholder="seu@email.com"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all placeholder:text-gray-400">
                </div>
                <div>
                    <label for="senha" class="block text-navy font-semibold mb-2 text-sm">Senha</label>
                    <input type="password"
                           id="senha"
                           name="senha"
                           required
                           minlength="4"
                           autocomplete="new-password"
                           placeholder="Crie uma senha"
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:border-gold focus:ring-2 focus:ring-gold/20 outline-none transition-all placeholder:text-gray-400">
                </div>
                <button type="submit"
                        class="w-full bg-navy text-gold font-semibold py-3.5 rounded-lg hover:bg-navy-light transition-colors duration-200 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-gold focus:ring-offset-2">
                    Cadastrar
                </button>
            </form>

            <p class="mt-6 text-center text-navy-light/60 text-sm">
                Já tem conta? <a href="login.html" class="text-gold font-semibold hover:underline">Fazer login</a>
            </p>
        </div>
    </div>

    <script>
        /**
         * Cadastro do advogado — dados persistidos no localStorage (sem banco de dados).
         * Chave utilizada: 'advogadoEscritorio' — objeto { nome, oab, email, senha }.
         */
        (function () {
            var form = document.getElementById('form-cadastro');
            var msgEl = document.getElementById('mensagem');

            function mostrarMensagem(texto, ehErro) {
                msgEl.textContent = texto;
                msgEl.className = 'mb-6 p-4 rounded-lg text-sm ' + (ehErro ? 'bg-red-50 text-red-700 border border-red-200' : 'bg-green-50 text-green-700 border border-green-200');
                msgEl.classList.remove('hidden');
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();

                var nome = document.getElementById('nome').value.trim();
                var oab = document.getElementById('oab').value.trim();
                var email = document.getElementById('email').value.trim().toLowerCase();
                var senha = document.getElementById('senha').value;

                if (!nome || !oab || !email || !senha) {
                    mostrarMensagem('Preencha todos os campos.', true);
                    return;
                }

                // Objeto do advogado a ser salvo (fonte dos dados: formulário → localStorage)
                var advogado = {
                    nome: nome,
                    oab: oab,
                    email: email,
                    senha: senha
                };

                // Persistência: salvando no localStorage (simula “banco” no navegador)
                try {
                    localStorage.setItem('advogadoEscritorio', JSON.stringify(advogado));
                    mostrarMensagem('Cadastro realizado com sucesso! Redirecionando para o login...', false);
                    setTimeout(function () {
                        window.location.href = 'login.html';
                    }, 1500);
                } catch (err) {
                    mostrarMensagem('Erro ao salvar. Verifique se o navegador permite localStorage.', true);
                }
            });
        })();
    </script>
</body>
</html>
